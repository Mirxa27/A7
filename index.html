<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent7 Intelligence Interface</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='15' fill='%23020617'/%3E%3Ctext x='50' y='68' font-size='50' text-anchor='middle' fill='%2310b981' font-family='monospace'%3EA7%3C/text%3E%3C/svg%3E" />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
      /* Tailwind CSS Base Styles */
      *, ::before, ::after {
        box-sizing: border-box;
        border-width: 0;
        border-style: solid;
        border-color: #e5e7eb;
      }
      body {
        margin: 0;
        line-height: 1.5;
        background-color: #020617;
        color: #e2e8f0;
        font-family: 'Share Tech Mono', monospace;
        cursor: crosshair;
        overflow: hidden;
      }
      /* Custom scrollbar for tactical feel */
      ::-webkit-scrollbar {
        width: 4px;
        height: 4px;
      }
      ::-webkit-scrollbar-track {
        background: rgba(15, 23, 42, 0.5); 
      }
      ::-webkit-scrollbar-thumb {
        background: #10b981;
        border-radius: 2px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #34d399; 
      }
      .animate-scanline {
        background: linear-gradient(to bottom, transparent 50%, rgba(16, 185, 129, 0.03) 51%, transparent 51%);
        background-size: 100% 4px;
        animation: scanline 8s linear infinite;
        pointer-events: none;
      }
      .vignette {
        background: radial-gradient(circle, transparent 40%, rgba(0, 0, 0, 0.4) 100%);
        pointer-events: none;
      }
      .noise {
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        opacity: 0.015;
        pointer-events: none;
      }
      @keyframes scanline {
        0% { background-position: 0 0; }
        100% { background-position: 0 100%; }
      }
      @keyframes flicker {
        0% { opacity: 0.97; }
        5% { opacity: 0.95; }
        10% { opacity: 0.9; }
        15% { opacity: 0.95; }
        20% { opacity: 0.98; }
        25% { opacity: 0.95; }
        30% { opacity: 0.9; }
        35% { opacity: 0.95; }
        40% { opacity: 0.98; }
        45% { opacity: 0.95; }
        50% { opacity: 0.9; }
        55% { opacity: 0.95; }
        60% { opacity: 0.98; }
        65% { opacity: 0.95; }
        70% { opacity: 0.9; }
        75% { opacity: 0.95; }
        80% { opacity: 0.98; }
        85% { opacity: 0.95; }
        90% { opacity: 0.9; }
        95% { opacity: 0.95; }
        100% { opacity: 0.98; }
      }
      .flicker {
        animation: flicker 0.15s infinite;
      }
      /* Utility classes */
      .flex { display: flex; }
      .grid { display: grid; }
      .hidden { display: none; }
      .block { display: block; }
      .inline-block { display: inline-block; }
      .absolute { position: absolute; }
      .relative { position: relative; }
      .fixed { position: fixed; }
      .inset-0 { top: 0; right: 0; bottom: 0; left: 0; }
      .w-full { width: 100%; }
      .h-full { height: 100%; }
      .min-h-screen { min-height: 100vh; }
      .pointer-events-none { pointer-events: none; }
      .z-50 { z-index: 50; }
      .z-\[60\] { z-index: 60; }
      .z-\[61\] { z-index: 61; }
      .z-\[62\] { z-index: 62; }
    </style>
  <script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.39.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "exifr": "https://esm.sh/exifr@7.1.3"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
    <div class="fixed inset-0 pointer-events-none z-[60] animate-scanline"></div>
    <div class="fixed inset-0 pointer-events-none z-[61] vignette"></div>
    <div class="fixed inset-0 pointer-events-none z-[62] noise"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
