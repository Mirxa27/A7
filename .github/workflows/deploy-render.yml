name: Deploy to Render

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
  RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Generate Prisma client
      run: npx prisma generate
    
    - name: Type check
      run: npm run lint
    
    - name: Build application
      run: npm run build

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    
    steps:
    - name: Deploy to Render
      run: |
        echo "🚀 Triggering deployment to Render..."
        
        # Using Render Deploy Hook
        if [ -n "$RENDER_DEPLOY_HOOK" ]; then
          curl -X POST "$RENDER_DEPLOY_HOOK"
          echo "✅ Deploy hook triggered successfully!"
        else
          echo "⚠️ RENDER_DEPLOY_HOOK not set. Manual deployment required."
          echo "To enable auto-deploy:"
          echo "1. Go to https://dashboard.render.com"
          echo "2. Select your service"
          echo "3. Go to Settings → Deploy Hook"
          echo "4. Copy the deploy hook URL"
          echo "5. Add it as RENDER_DEPLOY_HOOK secret in GitHub"
        fi
